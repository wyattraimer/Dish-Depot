<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#e63946" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Recipe Collector" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Collector</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #f2ebe3;
      }

      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 20000;
        display: grid;
        place-items: center;
        padding: 20px;
        background:
          radial-gradient(circle at 12% -8%, rgba(229, 92, 77, 0.22), transparent 42%),
          radial-gradient(circle at 100% 0%, rgba(114, 165, 138, 0.22), transparent 40%),
          linear-gradient(180deg, #fcf8f2 0%, #f7f2ea 45%, #f2ebe3 100%);
        color: #1f2933;
        transition: opacity 240ms ease, visibility 240ms ease;
      }

      #global-offline-banner {
        position: fixed;
        top: max(10px, env(safe-area-inset-top, 0px) + 6px);
        left: 12px;
        right: 12px;
        z-index: 27000;
        display: none;
        border-radius: 14px;
        border: 1px solid rgba(212, 132, 25, 0.3);
        background: linear-gradient(135deg, rgba(255, 236, 199, 0.96), rgba(255, 247, 221, 0.96));
        color: #6c3d0f;
        box-shadow: 0 10px 18px rgba(166, 105, 35, 0.2);
        padding: 0.62rem 0.82rem;
        font: 600 0.88rem/1.35 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
      }

      #global-offline-banner[data-visible='true'] {
        display: block;
      }

      #app-splash[data-hidden='true'] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-splash-card {
        width: min(340px, 100%);
        border-radius: 20px;
        text-align: center;
        padding: 24px 20px 18px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(90, 105, 122, 0.2);
        box-shadow: 0 14px 28px rgba(31, 41, 51, 0.14);
        backdrop-filter: blur(6px);
      }

      .app-splash-title {
        margin: 0;
        font: 700 clamp(1.4rem, 4.5vw, 1.7rem) 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
          Roboto, sans-serif;
        letter-spacing: 0.01em;
      }

      .app-splash-subtitle {
        margin: 0.45rem 0 0;
        font: 500 0.92rem/1.45 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #3f4f5f;
      }

      .app-splash-loader {
        width: 46px;
        height: 46px;
        margin: 0 auto 0.9rem;
        border-radius: 50%;
        border: 3px solid rgba(209, 72, 62, 0.2);
        border-top-color: #d1483e;
        animation: splash-spin 900ms linear infinite;
      }

      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-splash {
          transition: none;
        }

        .app-splash-loader {
          animation: none;
        }
      }
    </style>
    <script>
      ;(() => {
        const setBannerVisibility = () => {
          const banner = document.getElementById('global-offline-banner')
          if (!banner) return
          banner.setAttribute('data-visible', navigator.onLine ? 'false' : 'true')
        }

        document.addEventListener('DOMContentLoaded', setBannerVisibility)
        window.addEventListener('online', setBannerVisibility)
        window.addEventListener('offline', setBannerVisibility)
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') {
            setBannerVisibility()
          }
        })
      })()
    </script>
  </head>
  <body>
    <div id="global-offline-banner" role="status" aria-live="polite" data-visible="false">
      You are offline. URL extraction and external recipe links are unavailable until reconnect.
    </div>
    <div id="app-splash" role="status" aria-live="polite" aria-label="Loading Recipe Collector">
      <div class="app-splash-card">
        <div class="app-splash-loader" aria-hidden="true"></div>
        <p class="app-splash-title">Recipe Collector</p>
        <p class="app-splash-subtitle">Getting your recipes ready...</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
