services:
  - type: web
    name: dish-depot
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE
        value: /api
      - key: CORS_ALLOWED_ORIGINS
        value: https://www.dishdepot.app,https://recipes-zmky.onrender.com,https://org.coloradomesa.edu
