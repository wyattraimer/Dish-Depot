<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dish Depot Responsive Harness</title>
    <script type="module">
      import React from 'react'
      import { createRoot } from 'react-dom/client'
      import '@fortawesome/fontawesome-free/css/all.min.css'
      import '/src/index.css'
      import '/src/App.css'
      import ProfileModal from '/src/components/ProfileModal.jsx'
      import GroupManagementModal from '/src/components/GroupManagementModal.jsx'
      import GroupInvitesModal from '/src/components/GroupInvitesModal.jsx'
      import ShareRecipeModal from '/src/components/ShareRecipeModal.jsx'
      import ImportPreviewModal from '/src/components/ImportPreviewModal.jsx'

      const search = new URLSearchParams(window.location.search)
      const surface = search.get('surface') || 'profile'

      const noop = () => {}
      const dishDepotLogo = '/src/assets/dishdepot-no-background-674x674.png'

      function initialsFrom(value) {
        return String(value || 'DD')
          .split(/\s+/)
          .filter(Boolean)
          .slice(0, 2)
          .map((part) => part[0]?.toUpperCase() || '')
          .join('') || 'DD'
      }

      function IdentityAvatar({ avatarUrl, fallback = 'Dish Depot', tone = 'default' }) {
        return React.createElement(
          'span',
          { className: `identity-avatar identity-avatar-${tone}`, 'aria-hidden': true },
          avatarUrl
            ? React.createElement('img', { className: 'identity-avatar-image', src: avatarUrl, alt: '' })
            : initialsFrom(fallback),
        )
      }

      function IdentityBlock({ displayName, username, avatarUrl, fallback, meta, tone = 'default', compact = false }) {
        const label = displayName || (username ? `@${username}` : fallback)
        const sublabel = [displayName && username ? `@${username}` : !displayName && username ? 'Dish Depot member' : '', meta]
          .filter(Boolean)
          .join(' · ')

        return React.createElement(
          'div',
          { className: `identity-block${compact ? ' identity-block-compact' : ''}` },
          React.createElement(IdentityAvatar, { avatarUrl, fallback: label, tone }),
          React.createElement(
            'div',
            { className: 'identity-copy' },
            React.createElement('strong', null, label),
            sublabel ? React.createElement('small', null, sublabel) : null,
          ),
        )
      }

      function getIdentityProps({ userId, displayName, username, fallback }) {
        return { userId, displayName, username, fallback, avatarUrl: '' }
      }

      function formatInviteExpiry() {
        return 'Expires in 3 days'
      }

      function formatInviteTimestamp(value) {
        return value
      }

      function formatCategory(value) {
        return value.charAt(0).toUpperCase() + value.slice(1)
      }

      const shareTargetRecipe = {
        id: 'recipe-1',
        name: 'Roasted Vegetable Grain Bowl with Lemon Tahini Dressing',
      }

      const importCandidates = [
        {
          previewId: 'import-1',
          selected: true,
          recipe: {
            name: 'Spiced Lentil Soup',
            type: 'custom',
            url: '',
            categories: ['dinner', 'lunch'],
          },
        },
        {
          previewId: 'import-2',
          selected: false,
          recipe: {
            name: 'Sheet Pan Chicken with Citrus Herbs',
            type: 'url',
            url: 'https://example.com/very/long/source/link/for/testing/mobile/wrapping',
            categories: ['dinner'],
          },
        },
      ]

      const groupMembers = [
        { userId: '1', displayName: 'Alex Morgan', username: 'alex', role: 'admin' },
        { userId: '2', displayName: 'Priya Shah', username: 'priya', role: 'editor' },
        { userId: '3', displayName: 'Sam Lee', username: 'samlee', role: 'viewer' },
      ]

      const groupInvites = [
        {
          id: 'invite-1',
          invitedBy: '1',
          inviterDisplayName: 'Alex Morgan',
          inviterUsername: 'alex',
          groupName: 'Weeknight Dinner Club',
          role: 'editor',
          expiresAt: '2026-04-12T12:00:00Z',
          createdAt: 'Apr 9 at 10:30 AM',
        },
      ]

      const groupActivity = [
        {
          id: 'activity-1',
          actorUserId: '1',
          actorDisplayName: 'Alex Morgan',
          actorUsername: 'alex',
          type: 'recipe_added',
          summary: 'Added Lemon Pasta Primavera to the shared group collection.',
          createdAt: '2 hours ago',
        },
        {
          id: 'activity-2',
          actorUserId: '2',
          actorDisplayName: 'Priya Shah',
          actorUsername: 'priya',
          type: 'role_updated',
          summary: 'Updated Sam Lee to viewer access for this planning cycle.',
          createdAt: 'Yesterday',
        },
      ]

      function App() {
        const commonPage = React.createElement('div', { className: 'responsive-harness-page' })

        if (surface === 'profile') {
          return React.createElement(
            React.Fragment,
            null,
            commonPage,
            React.createElement(ProfileModal, {
              isOpen: true,
              onClose: noop,
              theme: 'light',
              onToggleTheme: noop,
              isResetFlowActive: false,
              onCompletePasswordReset: noop,
              resetPasswordDraft: '',
              onChangeResetPasswordDraft: noop,
              resetPasswordConfirm: '',
              onChangeResetPasswordConfirm: noop,
              onCancelPasswordReset: noop,
              resetPasswordBusy: false,
              authUser: { email: 'cook@dishdepot.test' },
              onProfileSave: noop,
              profileAvatarEditBtnRef: { current: null },
              onAvatarEditClick: noop,
              profileUploading: false,
              isAvatarActionMenuOpen: true,
              profileAvatarUrl: '',
              dishDepotLogo,
              profileAvatarInputRef: { current: null },
              onAvatarUpload: noop,
              profileAvatarMenuRef: { current: null },
              onSelectAvatarPhoto: noop,
              onRemoveAvatarPhoto: noop,
              profileAvatarValue: '',
              profileDisplayName: 'Jordan Rivera',
              onChangeProfileDisplayName: noop,
              profileUsername: 'jordancooks',
              onChangeProfileUsername: noop,
              onSignOut: noop,
              profileBusy: false,
              onAuthSubmit: noop,
              authMode: 'signin',
              onChangeAuthMode: noop,
              authDisplayName: '',
              onChangeAuthDisplayName: noop,
              authUsername: '',
              onChangeAuthUsername: noop,
              authEmail: 'cook@dishdepot.test',
              onChangeAuthEmail: noop,
              authPassword: '',
              onChangeAuthPassword: noop,
              onRequestPasswordReset: noop,
              authBusy: false,
            }),
          )
        }

        if (surface === 'groups') {
          return React.createElement(
            React.Fragment,
            null,
            commonPage,
            React.createElement(GroupManagementModal, {
              isOpen: true,
              onClose: noop,
              handleCreateGroup: (event) => event.preventDefault(),
              groupNameDraft: 'Weeknight Dinner Club',
              onChangeGroupNameDraft: noop,
              groupBusy: false,
              groups: [
                { id: 'group-1', name: 'Weeknight Dinner Club' },
                { id: 'group-2', name: 'Vacation Meal Plan' },
              ],
              selectedGroupId: 'group-1',
              onChangeSelectedGroup: noop,
              isUuidLike: () => true,
              searchGroupInviteCandidates: (event) => event.preventDefault(),
              groupInviteLookup: 'chefmaria',
              onChangeGroupInviteLookup: noop,
              canAdminSelectedGroup: true,
              groupInviteRole: 'editor',
              onChangeGroupInviteRole: noop,
              GROUP_ROLE_OPTIONS: ['viewer', 'contributor', 'editor', 'admin'],
              GROUP_ROLE_LABELS: { viewer: 'Viewer', contributor: 'Contributor', editor: 'Editor', admin: 'Admin' },
              GROUP_ROLE_DESCRIPTIONS: {
                viewer: 'view only',
                contributor: 'add recipes',
                editor: 'edit + remove recipes',
                admin: 'full group management',
              },
              groupInviteResults: [{ id: 'user-7', displayName: 'Chef Maria', username: 'chefmaria', avatarUrl: '' }],
              IdentityBlock,
              onAddUserToSelectedGroup: noop,
              groupInvitesLoading: false,
              groupPendingInvites: groupInvites,
              getIdentityProps,
              formatInviteExpiry,
              onResendGroupInvite: noop,
              onCancelGroupInvite: noop,
              groupMembersLoading: false,
              groupMembers,
              authUser: { id: '1' },
              onUpdateGroupMemberRole: noop,
              onRemoveUserFromSelectedGroup: noop,
              groupActivityLoading: false,
              groupActivityViewModels: groupActivity,
              IdentityAvatar,
              onDeleteSelectedGroup: noop,
            }),
          )
        }

        if (surface === 'group-invites') {
          return React.createElement(
            React.Fragment,
            null,
            commonPage,
            React.createElement(GroupInvitesModal, {
              isOpen: true,
              onClose: noop,
              groupInvitesLoading: false,
              pendingGroupInvites: groupInvites,
              IdentityBlock,
              getIdentityProps,
              GROUP_ROLE_LABELS: { viewer: 'Viewer', contributor: 'Contributor', editor: 'Editor', admin: 'Admin' },
              formatInviteExpiry,
              formatInviteTimestamp,
              onAcceptPendingGroupInvite: noop,
              onDeclinePendingGroupInvite: noop,
            }),
          )
        }

        if (surface === 'share') {
          return React.createElement(
            React.Fragment,
            null,
            commonPage,
            React.createElement(ShareRecipeModal, {
              isOpen: true,
              onClose: noop,
              shareTargetRecipe,
              searchShareCandidates: (event) => event.preventDefault(),
              shareLookupText: 'chefmaria',
              onChangeShareLookupText: noop,
              shareBusy: false,
              shareCanEdit: true,
              onChangeShareCanEdit: noop,
              shareResults: [{ id: 'user-7', displayName: 'Chef Maria', username: 'chefmaria', avatarUrl: '' }],
              IdentityBlock,
              onShareRecipeWithUser: noop,
              shareRecipientsLoading: false,
              shareRecipients: [
                { userId: 'user-2', displayName: 'Sam Lee', username: 'samlee', avatarUrl: '', canEdit: false },
                { userId: 'user-3', displayName: 'Priya Shah', username: 'priya', avatarUrl: '', canEdit: true },
              ],
              onUpdateSharePermission: noop,
              onRevokeShare: noop,
            }),
          )
        }

        if (surface === 'import') {
          return React.createElement(
            React.Fragment,
            null,
            commonPage,
            React.createElement(ImportPreviewModal, {
              isOpen: true,
              onClose: noop,
              importSummary: { totalInFile: 4, duplicateCount: 1, invalidCount: 1 },
              onSelectAll: noop,
              onClearAll: noop,
              importCandidates,
              onToggleCandidate: noop,
              formatCategory,
              onRemoveCandidate: noop,
              onConfirmImport: noop,
              selectedImportCount: 1,
            }),
          )
        }

        return React.createElement('div', { className: 'responsive-harness-fallback' }, `Unknown surface: ${surface}`)
      }

      createRoot(document.getElementById('root')).render(React.createElement(App))
    </script>
    <style>
      body {
        min-height: 100vh;
      }

      .responsive-harness-page {
        min-height: 100vh;
        background: linear-gradient(180deg, rgba(245, 238, 229, 0.88), rgba(255, 255, 255, 0.96));
      }

      .responsive-harness-fallback {
        padding: 2rem;
        font: 16px/1.5 Georgia, serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
